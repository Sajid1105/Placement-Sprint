services:
  - type: web
    name: placement-sprint-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://placementsprint.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SPRINT_START_DATE
        value: 2025-06-01
