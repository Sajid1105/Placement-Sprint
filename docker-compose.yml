services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/placement-sprint
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-dev-access-secret-min-32-characters-long}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-secret-min-32-characters-long}
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongo

volumes:
  mongo_data:
